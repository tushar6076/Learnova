<div class="modal fade" id="aiChatModal" tabindex="-1" aria-labelledby="aiChatModalLabel" aria-hidden="true"
    data-url="{{ url_for('home.ai_chat') }}"
    data-bs-context="{{ chat_context }}" 
    data-bs-chapter-id="{{ chapter.chapter_id if chapter else 'none' }}">
    
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content ai-modal-content border-0 shadow-lg">
            <div class="modal-header bg-primary text-white border-0 py-3">
                <h5 class="modal-title fw-bold" id="aiChatModalLabel">
                    <i class="bi bi-robot me-2"></i> 
                    Learnova AI {% if chat_context == 'chapter' %}(Chapter Tutor){% else %}(Assistant){% endif %}
                </h5>
                <div class="d-flex align-items-center">
                    <button type="button" class="btn btn-sm btn-outline-light border-0 me-2" id="clearChatBtn" title="Clear Chat History">
                        <i class="bi bi-trash3"></i>
                    </button>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
            </div>

            <div class="modal-body bg-light" id="aiChatBody">
                <div id="chatMessagesContainer">
                    </div>
                
                <div id="aiTypingIndicator" class="d-none mt-2">
                    <div class="chat-bubble-ai">
                        <div class="typing-dots">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer bg-white border-0 px-4 pb-4 pt-2">
                <div class="input-group chat-input-container shadow-sm p-1 rounded-pill border">
                    <button id="volume-toggle-btn" class="btn btn-primary rounded-circle ms-1 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        <i class="bi bi-volume-up-fill" id="volume-icon"></i>
                    </button>
                    
                    <input type="text" id="aiChatInput" class="form-control border-0 shadow-none bg-transparent px-3" placeholder="Ask me anything...">

                    <div class="d-flex align-items-center pe-1">
                        <button class="btn btn-link text-secondary border-0 px-3" id="startVoiceBtn">
                            <i class="bi bi-mic-fill fs-5" id="micIcon"></i>
                        </button>
                        
                        <button class="btn btn-primary rounded-circle d-none d-flex align-items-center justify-content-center" id="sendAiMessage" style="width: 40px; height: 40px;">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
